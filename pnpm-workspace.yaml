    '@astrojs/mdx': ^7.0.0
    '@astrojs/partytown': ^2.1.7
    '@astrojs/rss': ^4.0.18
    '@astrojs/sitemap': ^3.7.3
    '@napi-rs/image': ^1.14.0
    astro: ^7.0.3
    astro-oxidized-image: ^1.0.0-alpha
  dev:
    '@iconify/json': ^2.2.492
    '@unocss/astro': ^66.7.3
    astro-seo: ^1.1.0
    date-fns: ^4.4.0
    fast-xml-builder: ^1.2.0
    mdast-util-to-string: ^4.0.0
    react: ^19.2.7
    react-dom: ^19.2.7
    reading-time: ^1.5.0
    takumi-js: ^1.8.7
    taze: ^19.14.1
    ufo: ^1.6.4
    unocss: ^66.7.3
    vfile: ^6.0.3
    wrangler: ^4.105.0
  lint:
